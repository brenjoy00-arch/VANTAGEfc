<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vantage FC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 font-sans text-slate-900">

<div id="app-container" class="min-h-screen pb-32 overflow-x-hidden">
  
  <section id="screen-auth" class="min-h-screen flex items-center justify-center p-6 bg-emerald-600">
    <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl space-y-4 border-4 border-emerald-500">
      <div class="text-center mb-2">
        <h1 class="text-3xl font-black text-emerald-600 italic tracking-tighter uppercase">Vantage FC</h1>
        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-4">Master Squad Edition</p>
        
        <div class="flex flex-col space-y-2 mb-6">
          <button onclick="quickLogin('coach')" class="text-[10px] bg-emerald-50 text-emerald-600 font-black py-4 rounded-xl border border-emerald-100 uppercase hover:bg-emerald-100 transition">Quick Login: Coach</button>
          <button onclick="quickLogin('player')" class="text-[10px] bg-blue-50 text-blue-600 font-black py-4 rounded-xl border border-blue-100 uppercase hover:bg-blue-100 transition">Quick Login: Player</button>
        </div>
      </div>

      <div class="space-y-3 pt-4 border-t border-gray-100">
        <div class="flex space-x-2">
          <input type="text" id="reg-first" placeholder="First Name" class="w-1/2 p-3 bg-gray-50 rounded-xl text-sm outline-none border border-gray-100">
          <input type="text" id="reg-last" placeholder="Last Name" class="w-1/2 p-3 bg-gray-50 rounded-xl text-sm outline-none border border-gray-100">
        </div>
        <input type="text" id="reg-club" placeholder="Club Name" class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none border border-gray-100">
        <input type="text" id="reg-league" placeholder="League Name" class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none border border-gray-100">
        <input type="password" id="reg-pass" placeholder="Password" class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none border border-gray-100">
        
        <div class="pt-2 flex space-x-2">
          <button onclick="handleLogin('coach')" class="w-1/2 bg-emerald-600 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg">Join Coach</button>
          <button onclick="handleLogin('player')" class="w-1/2 bg-gray-800 text-white py-4 rounded-xl font-black text-xs uppercase shadow-lg">Join Player</button>
        </div>
      </div>
    </div>
  </section>

  <div id="screen-main" class="hidden">
    <header class="bg-white p-5 shadow-sm sticky top-0 z-50 flex justify-between items-center rounded-b-[2rem]">
      <div>
        <h2 id="user-welcome" class="text-lg font-black text-gray-800 italic leading-none uppercase">Hi!</h2>
        <p id="club-display" class="text-[10px] text-emerald-600 font-bold uppercase mt-1 italic">Club Name</p>
      </div>
      <span id="role-badge" class="text-[8px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">Role</span>
    </header>

    <main class="p-4 max-w-md mx-auto space-y-6">
      
      <div id="tab-home" class="tab-content space-y-6">
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border-t-4 border-emerald-500">
            <div class="flex justify-between items-center mb-4">
                <p class="text-[10px] font-black text-emerald-600 uppercase italic">Match Day</p>
                <span class="text-[9px] bg-red-100 text-red-600 px-2 py-1 rounded-lg font-black uppercase tracking-tighter">Live Tracker</span>
            </div>
            <div class="flex items-center justify-between px-2 mb-4">
                <div class="text-center w-1/3">
                    <div class="w-12 h-12 bg-emerald-50 rounded-full mx-auto mb-2 flex items-center justify-center font-black text-emerald-600 border border-emerald-100" id="home-team-logo">SF</div>
                    <p class="text-[10px] font-black truncate uppercase" id="home-team-name-display">My Club</p>
                </div>
                <div class="text-center"><p class="text-xl font-black italic">VS</p></div>
                <div class="text-center w-1/3">
                    <div class="w-12 h-12 bg-gray-50 rounded-full mx-auto mb-2 flex items-center justify-center font-black text-gray-400 border border-gray-100">TT</div>
                    <p class="text-[10px] font-black truncate uppercase">Titans FC</p>
                </div>
            </div>
            <div class="border-t border-gray-50 pt-4">
                <p class="text-[9px] font-black text-gray-400 uppercase mb-3">Goal Scorer Log</p>
                <div id="goal-list" class="space-y-1 mb-3"></div>
                <div class="coach-only flex space-x-2">
                    <input type="text" id="goal-input" placeholder="Player Name..." class="flex-grow p-2 bg-gray-50 rounded-lg text-[10px] border border-gray-100 outline-none">
                    <button onclick="addGoal()" class="bg-emerald-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-md">Add Goal</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] p-5 shadow-sm">
          <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 italic">League Table</h3>
          <table class="w-full text-[11px] text-left">
            <tr class="text-gray-400 border-b border-gray-50"><th>POS</th><th>CLUB</th><th>P</th><th>PTS</th></tr>
            <tr class="font-bold text-emerald-600 border-b border-gray-50"><td>1</td><td id="league-club-display">SQUADFLOW</td><td>12</td><td>30</td></tr>
            <tr class="text-gray-600"><td>2</td><td>TITANS FC</td><td>12</td><td>25</td></tr>
          </table>
        </div>
      </div>

      <div id="tab-messages" class="tab-content hidden space-y-4">
        <div class="bg-white p-4 rounded-2xl shadow-sm border-2 border-amber-400">
          <p class="text-[10px] font-black text-amber-500 uppercase italic">🚗 Ride Check</p>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <button class="p-2 border-2 border-gray-100 text-[10px] font-black rounded-xl uppercase hover:border-amber-400">Need Lift</button>
            <button class="p-2 border-2 border-gray-100 text-[10px] font-black rounded-xl uppercase hover:border-emerald-400">Can Drive</button>
          </div>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm space-y-3 border border-gray-100">
           <textarea id="chat-input" placeholder="Message the squad..." class="w-full p-3 bg-gray-50 rounded-xl text-xs outline-none h-20 resize-none"></textarea>
           <div class="flex space-x-2">
             <button onclick="postMessage()" class="flex-grow bg-emerald-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md">Post Update</button>
             <button onclick="togglePollModal()" class="coach-only bg-gray-800 text-white px-4 rounded-xl font-black text-[10px] uppercase shadow-md">New Poll</button>
           </div>
        </div>
        <div id="chat-feed" class="space-y-4 pb-10"></div>
      </div>

      <div id="tab-tactics" class="tab-content hidden space-y-4">
        <div class="flex justify-between items-center px-1">
          <div class="flex space-x-2 items-center">
            <button id="btn-blue" onclick="setMarkerColor('blue')" class="w-10 h-10 rounded-full bg-blue-600 border-4 border-white shadow scale-110"></button>
            <button id="btn-red" onclick="setMarkerColor('red')" class="w-10 h-10 rounded-full bg-red-600 border-2 border-white shadow"></button>
            <span class="text-[9px] font-black text-gray-400 uppercase italic ml-2">Tap Pitch to Place</span>
          </div>
          <button onclick="clearMarkers()" class="coach-only text-[10px] font-black text-red-500 bg-red-50 px-4 py-2 rounded-full uppercase">Reset</button>
        </div>
        <div id="tactical-pitch" class="relative w-full aspect-[3/4] bg-emerald-700 rounded-[2.5rem] border-4 border-white shadow-2xl overflow-hidden cursor-crosshair">
            <div class="absolute inset-0 pointer-events-none">
              <div class="absolute top-0 left-1/2 -translate-x-1/2 w-48 h-20 border-b-2 border-x-2 border-white/40"></div>
              <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-48 h-20 border-t-2 border-x-2 border-white/40"></div>
              <div class="absolute top-1/2 w-full h-px bg-white/40"></div>
              <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 border-2 border-white/40 rounded-full"></div>
            </div>
        </div>
      </div>

      <div id="tab-drills" class="tab-content hidden space-y-4">
        <div class="coach-only bg-white p-5 rounded-3xl border-2 border-emerald-100">
          <input type="text" id="drill-title" placeholder="Drill Name" class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none mb-2 border border-gray-100">
          <textarea id="drill-notes" placeholder="Instructions..." class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none h-20 border border-gray-100 mb-2 resize-none"></textarea>
          <input type="text" id="drill-clip" placeholder="Video URL" class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none mb-3 border border-gray-100">
          <button onclick="addDrill()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-lg">Upload Drill</button>
        </div>
        <div id="drill-feed" class="space-y-4"></div>
      </div>

      <div id="tab-lineup" class="tab-content hidden space-y-4">
        <div class="relative w-full aspect-[3/4] bg-emerald-800 rounded-[2.5rem] border-4 border-white/20 shadow-2xl p-6 flex flex-col justify-between">
          <div class="flex justify-around mt-4"><div class="player-slot" onclick="setSlot(this)">ST</div><div class="player-slot" onclick="setSlot(this)">ST</div></div>
          <div class="flex justify-between px-2"><div class="player-slot" onclick="setSlot(this)">LM</div><div class="player-slot" onclick="setSlot(this)">CM</div><div class="player-slot" onclick="setSlot(this)">CM</div><div class="player-slot" onclick="setSlot(this)">RM</div></div>
          <div class="flex justify-between px-2"><div class="player-slot" onclick="setSlot(this)">LB</div><div class="player-slot" onclick="setSlot(this)">CB</div><div class="player-slot" onclick="setSlot(this)">CB</div><div class="player-slot" onclick="setSlot(this)">RB</div></div>
          <div class="player-slot bg-yellow-500 mx-auto" onclick="setSlot(this)">GK</div>
        </div>
      </div>

      <div id="tab-profile" class="tab-content hidden space-y-6">
        <div class="bg-white p-8 rounded-[3rem] shadow-sm text-center">
          <div id="prof-initials" class="w-20 h-20 bg-emerald-600 rounded-full mx-auto mb-4 flex items-center justify-center text-white text-2xl font-black">SF</div>
          <h2 id="prof-name" class="text-xl font-black text-gray-800 italic uppercase">User</h2>
          <p id="prof-club" class="text-[10px] text-emerald-600 font-bold uppercase mt-1"></p>
          <button onclick="location.reload()" class="w-full text-[10px] font-black text-red-400 uppercase bg-red-50 py-4 rounded-2xl mt-10">Log Out</button>
        </div>
      </div>

    </main>

    <nav class="fixed bottom-0 w-full bg-white/95 backdrop-blur-md border-t flex justify-around p-5 z-50 rounded-t-[2.5rem] shadow-2xl">
      <button onclick="showTab('tab-home', this)" class="nav-btn text-emerald-600"><i class="fas fa-house"></i></button>
      <button onclick="showTab('tab-messages', this)" class="nav-btn text-gray-300"><i class="fas fa-comment-dots"></i></button>
      <button onclick="showTab('tab-tactics', this)" class="nav-btn text-gray-300"><i class="fas fa-pencil-ruler"></i></button>
      <button onclick="showTab('tab-drills', this)" class="nav-btn text-gray-300"><i class="fas fa-book-open"></i></button>
      <button onclick="showTab('tab-lineup', this)" class="nav-btn text-gray-300"><i class="fas fa-clipboard-user"></i></button>
    </nav>
  </div>

  <div id="poll-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-[60] flex items-center justify-center p-8">
    <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 space-y-4">
      <p class="text-center font-black text-gray-400 text-[10px] uppercase italic">Squad Poll</p>
      <input type="text" id="poll-title" placeholder="Question?" class="w-full p-3 bg-gray-50 rounded-xl text-sm outline-none border border-gray-100">
      <button onclick="addPollFromInput()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-lg">Post Poll</button>
      <button onclick="togglePollModal()" class="w-full text-center text-gray-300 font-bold text-[10px] pt-2">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
